<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Student Registration</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }

        /* Assignment Header */
        .header-info {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header-info h2 { margin: 5px 0; font-size: 1.4rem; }

        /* Form Container */
        .form-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .form-container h2 {
            text-align: center;
            color: #4a148c;
            margin-bottom: 30px;
            font-size: 28px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Form Layout */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        /* Radio & Checkbox Styling */
        .inline-group {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .inline-group input {
            margin-right: 5px;
            cursor: pointer;
        }

        .inline-group span {
            margin-right: 15px;
            font-size: 14px;
        }

        /* Submit Button */
        input[type="submit"] {
            width: 100%;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

    </style>
</head>

<body>

<div class="header-info">
    <h2>Assignment No. 9: Student Registration Webpage</h2>
    <h2>Name: Sanika Topkar</h2>
    <h2>Roll No: 34 | Class: SY (CSE A)</h2>
</div>

<div class="form-container">
    <h2>Registration Form</h2>

    <form action="#">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Phone Number</label>
                <input type="tel" placeholder="9876543210" pattern="[0-9]{10}">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="inline-group">
                <input type="radio" name="gender" id="m"> <span>Male</span>
                <input type="radio" name="gender" id="f"> <span>Female</span>
                <input type="radio" name="gender" id="o"> <span>Other</span>
            </div>
        </div>

        <div class="form-group">
            <label>Select Course</label>
            <select required>
                <option value="" disabled selected>Choose your department</option>
                <option>Computer Science & Engineering</option>
                <option>Artificial Intelligence & ML</option>
                <option>Information Technology</option>
                <option>ENTC</option>
                <option>Civil Engineering</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload Profile Photo</label>
            <input type="file" style="border:none; padding: 5px 0;">
        </div>

        <div class="form-group">
            <label>Permanent Address</label>
            <textarea rows="3" placeholder="Enter your full residential address"></textarea>
        </div>

        <div class="form-group">
            <label>Technical Interests / Hobbies</label>
            <div class="inline-group">
                <input type="checkbox"> <span>Coding</span>
                <input type="checkbox"> <span>Web Design</span>
                <input type="checkbox"> <span>Gaming</span>
                <input type="checkbox"> <span>Music</span>
            </div>
        </div>

        <input type="submit" value="Complete Registration">
    </form>
</div>

</body>
</html>
